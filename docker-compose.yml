version: '3.8'

services:
  # FastAPI Backend Service
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ai_multimedia_qa
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy

  # Next.js Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Redis Cache & Rate Limiting Service
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
