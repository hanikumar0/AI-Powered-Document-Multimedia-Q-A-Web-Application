name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linting
        run: |
          black --check .
          isort --check-only .
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Backend Tests
        env:
          GOOGLE_API_KEY: "mock_key"
          JWT_SECRET_KEY: "mock_secret"
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "test_db"
          UPLOAD_DIR: "./test_uploads"
        run: |
          python -m pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=95 tests/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Linting
        run: npm run lint

      - name: Run Frontend Tests
        run: npm run test:coverage -- --ci --coverageReporters="text" --coverageReporters="xml"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/clover.xml
